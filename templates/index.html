<!DOCTYPE html>
<html>
<head>
    <title>Italy Travel Assistant</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url("{{ url_for('static', filename='bg.jpg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
        }

        .overlay {
            background: linear-gradient(to right, rgba(0,0,0,0.25), rgba(0,0,0,0.1));
            height: 100vh;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 60px;
        }

        .left-text {
            color: white;
            max-width: 500px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            margin-top: 280px;
        }

        .left-text h1 {
            font-size: 44px;
            margin-bottom: 20px;
            line-height: 1.3;
        }

        .italy-green { color: #008C45; }
        .italy-white { color: #ffffff; }
        .italy-red { color: #CD212A; }

        .left-text p {
            font-size: 20px;
            line-height: 1.7;
        }

        .form-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 35px;
            border-radius: 20px;
            width: 520px;
            color: black;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px;
            font-size: 16px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button {
            padding: 14px 22px;
            font-size: 16px;
            background: linear-gradient(45deg, #e74c3c, #ff6b6b);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background: linear-gradient(45deg, #c0392b, #ff4d4d);
        }

        .answer-box {
            margin-top: 15px;
            padding: 22px;
            background: white;
            border-radius: 12px;
            color: black;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            max-height: 350px;
            overflow-y: auto;
            text-align: left;
            font-size: 16px;
            line-height: 1.8;
        }
    </style>
</head>

<body>

<div class="overlay">

    <div class="left-text">
        <h1>
            <span class="italy-green">Italy</span>
            <span class="italy-white">Through</span>
            <span class="italy-red">My Eyes</span>
        </h1>

        <p>
            This is not just information about Italy — it’s my personal journey.
            Ask questions and get real insights, honest feedback, and practical tips
            based on what I actually experienced.
        </p>
    </div>

    <div class="form-box">

        <form method="POST">
            <div class="form-row">
                <input type="text" name="question" placeholder="Ask about my Italy trip ✈️" required>
                <button type="submit">Ask</button>
            </div>
        </form>

        {% if answer %}
        <div class="answer-box">
            <p>{{ answer }}</p>
        </div>
        {% endif %}

    </div>

</div>

</body>
</html>
